    <script>
        class VPNConfigArchitect {
            constructor() {
                this.ENDPOINT = "https://curly-bonus-7ec5.zaychox9star.workers.dev";
                this.sessionToken = null;
                this.userRole = null; 
                this.payloadCache = null;
                this.tgUserId = null; 
                this.otpConsumed = false;

                this.ui = {
                    views: { login: document.getElementById('view-login'), builder: document.getElementById('view-builder'), results: document.getElementById('view-results') },
                    login: { user: document.getElementById('inp-username'), pass: document.getElementById('inp-password'), btn: document.getElementById('btn-login'), err: document.getElementById('msg-login-error') },
                    builder: { name: document.getElementById('inp-profile-name'), buildBtn: document.getElementById('btn-execute-build'), status: document.getElementById('msg-build-status'), lblBtn: document.getElementById('lbl-btn-status'), resetBtn: document.getElementById('btn-create-another') },
                    containers: { output: document.getElementById('render-target-configs'), qrBuffer: document.getElementById('canvas-vault-hidden') }
                };
                this.initTelegram();
                this.bootstrap();
            }

            initTelegram() {
                if (window.Telegram && window.Telegram.WebApp) {
                    window.Telegram.WebApp.expand();
                    const initData = window.Telegram.WebApp.initDataUnsafe;
                    if (initData && initData.user) this.tgUserId = initData.user.id;
                }
            }

            bootstrap() {
                this.ui.login.btn.addEventListener('click', () => this.handleLogin());
                this.ui.builder.buildBtn.addEventListener('click', () => this.compilePayload());
                this.ui.builder.resetBtn.addEventListener('click', () => {
                    if (this.userRole === 'admin') this.switchView('builder');
                });
                
                window.triggerAssetDownloadWrap = (type) => this.downloadAssetWrap(type);
                window.sendToTelegramWrap = (btnElement, sendConf, sendQr, sendGuide) => this.pushToTelegramChatWrap(btnElement, sendConf, sendQr, sendGuide);
            }

            async handleLogin() {
                const user = this.ui.login.user.value.trim(); const pass = this.ui.login.pass.value.trim();
                if(!user || !pass) return;
                this.ui.login.btn.querySelector('span').innerText = "VERIFYING..."; this.ui.login.btn.disabled = true; this.ui.login.err.classList.add('hidden');
                try {
                    const res = await fetch(`${this.ENDPOINT}/auth/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: user, password: pass }) });
                    const data = await res.json();
                    if(data.success) { 
                        this.sessionToken = data.token; 
                        this.userRole = data.role; 
                        this.switchView('builder'); 
                        if (this.userRole === 'admin') {
                            this.ui.builder.resetBtn.classList.remove('hidden');
                        }
                    } 
                    else throw new Error(data.error || "Login Failed");
                } catch (e) { this.ui.login.err.innerText = e.message; this.ui.login.err.classList.remove('hidden'); } 
                finally { this.ui.login.btn.querySelector('span').innerText = "AUTHENTICATE"; this.ui.login.btn.disabled = false; }
            }

            encodeBytesToBase64(uint8Array) { return btoa(String.fromCharCode.apply(null, uint8Array)); }
            generateCryptoID() { return crypto.randomUUID ? crypto.randomUUID() : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => { const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8); return v.toString(16); }); }
            updateFeedback(msg, isError = false) { const el = this.ui.builder.status; el.textContent = msg; el.className = `text-xs font-bold block mt-4 ${isError ? 'text-red-500' : 'text-[#ccff00]'}`; el.classList.remove('hidden'); }
            
            switchView(target) { 
                Object.values(this.ui.views).forEach(v => v.classList.add('hidden')); 
                this.ui.views[target].classList.remove('hidden'); 
                if (target === 'builder') {
                    this.ui.containers.output.innerHTML = '';
                    this.ui.builder.status.classList.add('hidden');
                    this.ui.builder.name.value = '';
                }
            }

            generateDocumentation(fileName) {
                return `✅ <b>Config ဖန်တီးမှု အောင်မြင်ပါသည်!</b>\n\n================================\n🌟 <b>9Star VPN & Store × ZC.</b> 🌟\nPremium High-Speed VPN Guide\n================================\n\n❌ <b>[အလွန်အရေးကြီးသော သတိပေးချက် - မဖတ်မနေရ]</b> ❌\nသင့်အတွက် ယခုထုတ်ပေးထားသော Config ဖိုင် (<code>${fileName}.conf</code>) သည်\n<b>"Device တစ်ခုတည်းတွင်သာ အသုံးပြုရန် (1 Device Only)"</b> သတ်မှတ်ထားပါသည်။\n\n⚠️ ဖုန်းတစ်လုံးထက်ပို၍ဖြစ်စေ၊ ဖုန်းနှင့်ကွန်ပျူတာပြိုင်တူဖြစ်စေ ချိတ်ဆက်မိပါက\nCloudflare စနစ်မှ သင့် IP အား လုံးဝ Block ပြုလုပ်သွားမည်ဖြစ်ပြီး အင်တာနက်ချိတ်ဆက်မှု လုံးဝ ပြတ်တောက်သွားမည် ဖြစ်သည်။\n\n================================\n<b>[၁] လိုအပ်သော VPN Apps များ ဒေါင်းလုဒ်ရယူရန်</b>\n================================\n▶ <b>၁။ AmneziaWG VPN (အထူးအကြံပြုသည်)</b>\n- <a href="https://play.google.com/store/apps/details?id=org.amnezia.awg">Android (Google Play)</a>\n- <a href="https://apps.apple.com/us/app/amneziawg/id6478942365">iOS / Mac (App Store)</a>\n- <a href="https://github.com/amnezia-vpn/amneziawg-windows-client/releases/latest">Windows (PC Installer)</a>\n\n▶ <b>၂။ WireGuard VPN (ရွေးချယ်ရန်)</b>\n- <a href="https://play.google.com/store/apps/details?id=com.wireguard.android">Android (Google Play)</a>\n- <a href="https://apps.apple.com/us/app/wireguard/id1441195209">iOS / Mac (App Store)</a>\n- <a href="https://www.wireguard.com/install/">Windows (PC Build)</a>\n\n================================\n<b>[၂] အသုံးပြုနည်း အသေးစိတ် လမ်းညွှန်</b>\n================================\n<b>(က) .Conf ဖိုင်ဖြင့် ထည့်သွင်းနည်း (Import from file)</b>\n၁။ ပေးပို့ထားသော <code>${fileName}.conf</code> ဖိုင်ကို ဖုန်းထဲသို့ Save (ဒေါင်းလုဒ်) လုပ်ပါ။\n၂။ AmneziaWG (သို့မဟုတ်) WireGuard App ကိုဖွင့်ပါ။\n၃။ App ၏ ညာဘက်အောက်ထောင့် (+) ခလုတ်ကို နှိပ်ပါ။\n၄။ "Import from file or archive" ကိုရွေးချယ်ပြီး <code>${fileName}.conf</code> ဖိုင်ကို ရွေးပေးပါ။\n\n<b>(ခ) QR Code ဖြင့် Scan ဖတ်နည်း (Create from QR code)</b>\n၁။ ပေးပို့ထားသော QR ပုံကို အခြားဖုန်း သို့မဟုတ် ကွန်ပျူတာတွင် ဖွင့်ထ             }

            async compilePayload() {
                const rawName = this.ui.builder.name.value.trim();
                this.ui.builder.buildBtn.disabled = true; this.ui.builder.lblBtn.innerText = `Compiling Profile...`;
                try {
                    this.updateFeedback(`Authorizing & Connecting to Gateway...`);
                    const naclKeys = nacl.box.keyPair(); const pvt = this.encodeBytesToBase64(naclKeys.secretKey); const pub = this.encodeBytesToBase64(naclKeys.publicKey);
                    const requestBody = { key: pub, install_id: this.generateCryptoID(), fcm_token: `${this.generateCryptoID()}:APA91b${this.generateCryptoID()}`, tos: new Date().toISOString(), model: "AutoBuilder", locale: "en_US" };

                    const response = await fetch(`${this.ENDPOINT}/api/generate`, { method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${this.sessionToken}` }, body: JSON.stringify(requestBody) });
                    const resData = await response.json();
                    if (!response.ok || resData.success === false) throw new Error(resData.error || `Rejected: ${response.status}`);

                    const finalTitle = rawName === "" ? "WARP_" + (Math.floor(Math.random() * 9000) + 1000) : rawName;
                    const pureConfText = `[Interface]\nPrivateKey = ${pvt}\nAddress = ${resData.config.interface.addresses.v4}/32, ${resData.config.interface.addresses.v6}/128\nDNS = 1.1.1.1, 1.0.0.1\nMTU = 1280\n\n[Peer]\nPublicKey = ${resData.config.peers[0].public_key}\nAllowedIPs = 0.0.0.0/0, ::/0\nEndpoint = 162.159.192.1:500`;

                    this.ui.containers.qrBuffer.innerHTML = ""; 
                    new QRCode(this.ui.containers.qrBuffer, { 
                        text: pureConfText, 
                        width: 220, 
                        height: 220, 
                        colorDark : "#0a0a0c", 
                        colorLight : "#ffffff", 
                        correctLevel: QRCode.CorrectLevel.M 
                    });
                    
                    await new Promise(r => setTimeout(r, 200));
                    
                    const cvs = document.createElement("canvas"); 
                    cvs.width = 250; cvs.height = 270; 
                    const ctx = cvs.getContext("2d"); 
                    ctx.fillStyle = "#ffffff"; 
                    ctx.fillRect(0, 0, 250, 270); 
                    ctx.drawImage(this.ui.containers.qrBuffer.querySelector("canvas"), 15, 15);
                    
                    ctx.fillStyle = "#000000";
                    ctx.font = "bold 15px Montserrat, sans-serif";
                    ctx.textAlign = "center";
                    ctx.fillText(finalTitle, 125, 255); 

                    const extractedQR = cvs.toDataURL("image/png").split(',')[1];
                    const docText = this.generateDocumentation(finalTitle);

                    this.payloadCache = { fileName: finalTitle, dataConf: pureConfText, imgCode: extractedQR, guideTxt: docText };

                    this.drawOutputCard(); this.switchView('results');
                } catch (ex) { this.updateFeedback('❌ ' + ex.message, true); } 
                finally { this.ui.builder.buildBtn.disabled = false; this.ui.builder.lblBtn.innerText = "Build Configuration"; }
            }

            drawOutputCard() {
                const targetConfig = this.payloadCache;
                let actionButtons = "";

                if (this.userRole === 'admin') {
                    actionButtons = `

                            <button onclick="window.sendToTelegramWrap(this, true, false, false)" class="send-btn w-full py-3 core-btn rounded-xl text-[11px] uppercase tracking-widest font-bold">
                                📄 Send .Conf Only
                            </button>
                            <button onclick="window.sendToTelegramWrap(this, false, true, false)" class="send-btn w-full py-3 btn-water-blue rounded-xl text-[11px] uppercase tracking-widest font-bold">
                                🖼️ Send QR Only
                            </button>
                            <button onclick="window.sendToTelegramWrap(this, true, true, false)" class="send-btn w-full py-3 btn-water-red rounded-xl text-[11px] uppercase tracking-widest font-bold">
                                📦 Send Both (No Guide)
                            </button>
                            <button onclick="window.sendToTelegramWrap(this, true, true, true)" class="send-btn w-full py-3 tg-btn rounded-xl text-[11px] uppercase tracking-widest font-bold">
                                📩 Send All (With Guide)
                            </button>
                        </div>
                        <p class="text-[10px] text-[#ccff00] mt-3 text-center">Admin Mode: Unlimited Access</p>`;
                } 
                else if (this.tgUserId) {
                    actionButtons = `
                        <button id="btn-tg-send" onclick="window.sendToTelegramWrap(this, true, true, true)" class="send-btn w-full py-4 tg-btn rounded-2xl text-[12px] uppercase tracking-widest flex items-center justify-center gap-2 font-bold">
                            <span>📥 Send Config & Guide to My Chat</span>
                        </button>
                        <p class="text-[10px] text-gray-400 mt-2 text-center">Telegram ထဲသို့ တိုက်ရိုက်ပို့ပြီးမှသာ OTP အသုံးပြုမှု ဖြတ်ပါမည်</p>`;
                } 
                else {
                    actionButtons = `
                        <div class="space-y-2">
                            <button onclick="window.triggerAssetDownloadWrap('conf')" class="w-full py-3.5 core-btn rounded-2xl text-[11px] uppercase tracking-widest flex items-center justify-center gap-2 font-bold"><span>📄 Save .Conf File</span></button>
                            <button onclick="window.triggerAssetDownloadWrap('qr')" class="w-full btn-water-blue py-3.5 rounded-2xl text-[11px] font-bold uppercase tracking-widest">🖼️ Save QR Image</button>
                        </div>
                        <p class="text-[10px] text-gray-400 mt-2 text-center">ဖိုင်များကို Download လုပ်မှသာ OTP အသုံးပြုမှု ဖြတ်ပါမည်</p>`;
                }

                const cardTemplate = `
                    <div class="acrylic-card p-5 anim-ascend">
                        <div class="text-center mb-4">
                            <span class="inline-block bg-[#ccff00]/10 text-[#ccff00] border border-[#ccff00]/30 px-3 py-1 rounded-full text-[10px] font-bold tracking-widest uppercase">
                                Config Generated Successfully
                            </span>
                            <h3 class="text-[#ccff00] font-bold text-xl mt-2 tracking-wide">${targetConfig.fileName}</h3>
                        </div>
                        <div class="flex justify-center mb-5">

            async consumeOTPSecurely() {
                if (this.userRole === 'admin') return true; 
                if (this.otpConsumed) return true; 

                try {
                    const res = await fetch(`${this.ENDPOINT}/api/consume`, {
                        method: 'POST', headers: { 'Authorization': `Bearer ${this.sessionToken}` }
                    });
                    const data = await res.json();
                    if (data.success) {
                        this.otpConsumed = true; return true;
                    } else {
                        alert("Error: " + (data.error || "OTP သက်တမ်းကုန်ဆုံးသွားပါပြီ။")); return false;
                    }
                } catch (e) { alert("Network error. ကျေးဇူးပြု၍ ပြန်လည်ကြိုးစားပါ။"); return false; }
            }

            async pushToTelegramChatWrap(btnElement, sendConf = true, sendQr = true, sendGuide = true) {
                const originalText = btnElement.innerHTML;
                btnElement.disabled = true; 
                btnElement.innerHTML = `<span>⏳ ပို့ဆောင်နေပါသည်...</span>`;
                
                const canProceed = await this.consumeOTPSecurely();
                if (!canProceed) { btnElement.disabled = false; btnElement.innerHTML = originalText; return; }

                try {
                    const payload = { 
                        chatId: this.tgUserId, 
                        fileName: this.payloadCache.fileName, 
                        confData: sendConf ? this.payloadCache.dataConf : null, 
                        qrBase64: sendQr ? this.payloadCache.imgCode : null, 
                        guideText: sendGuide ? this.payloadCache.guideTxt : null 
                    };
                    const response = await fetch(`${this.ENDPOINT}/api/send-telegram`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    if (response.ok) {
                        btnElement.innerHTML = `<span>✅ အောင်မြင်ပါသည်!</span>`;
                        btnElement.classList.replace('btn-water-blue', 'core-btn');
                        btnElement.classList.replace('btn-water-red', 'core-btn');
                        btnElement.classList.replace('tg-btn', 'core-btn');
                        
                        if (this.userRole !== 'admin') {
                            setTimeout(() => { if (window.Telegram && window.Telegram.WebApp) window.Telegram.WebApp.close(); }, 2500);
                        }
                    } else throw new Error("Failed");
                } catch (err) { btnElement.disabled = false; btnElement.innerHTML = `<span>❌ ပြန်လည်ကြိုးစားပါ</span>`; }
            }

            async downloadAssetWrap(type) {
                const canProceed = await this.consumeOTPSecurely();
                if (canProceed) this.downloadAsset(type);
            }

            downloadAsset(type) {
                const blobTarget = this.payloadCache; const anchor = document.createElement("a");
                switch(type) {
                    case 'conf': anchor.href = URL.createObjectURL(new Blob([blobTarget.dataConf], { type: 'application/x-wireguard-profile' })); anchor.download = `${blobTarget.fileName}.conf`; break;
                    case 'qr': anchor.href = "data:image/png;base64," + blobTarget.imgCode; anchor.download = `${blobTarget.fileName}_QR.png`; break;
                }
                document.body.appendChild(anchor); anchor.click(); document.body.removeChild(anchor);
            }
